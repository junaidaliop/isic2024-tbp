name: ci
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install (CPU-only; no torch/timm needed for spine tests)
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas pyarrow scikit-learn scipy pyyaml pytest ruff
      - name: Lint
        run: ruff check src tests reports
      - name: Spine tests (metric anchors, no-leak, official-equivalence)
        run: pytest -q tests/test_cv.py tests/test_features.py
